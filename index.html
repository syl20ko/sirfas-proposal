<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>SIRFAS — Proposition stratégique</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600;700&family=Roboto+Slab:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#1E252F;--navy-light:#2A3340;--slate:#45464D;--slate-light:#899296;
  --gold:#C2B697;--gold-light:#D4C9AE;--gold-dark:#A99D7E;--gold-pale:#F5F0E6;
  --teal:#0C769F;--teal-light:#0D8AB8;--teal-dark:#095E7F;
  --bg:#F7F7F7;--bg-warm:#FAF8F4;--white:#FFFFFF;--text:#42474C;
  --serif:'Roboto Slab',Georgia,serif;
  --sans:'Roboto',system-ui,-apple-system,sans-serif;
  --ease:cubic-bezier(.4,0,.2,1);
}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);color:var(--text);background:var(--bg);line-height:1.6;font-size:16px;overflow-x:hidden}

/* LOGIN */
.login-screen{position:fixed;inset:0;z-index:1000;display:flex;align-items:center;justify-content:center;background:var(--navy);transition:opacity .6s var(--ease),visibility .6s}
.login-screen.hidden{opacity:0;visibility:hidden;pointer-events:none}
.login-card{background:var(--white);border-radius:16px;padding:48px 40px;max-width:420px;width:90%;text-align:center;box-shadow:0 25px 50px -12px rgba(0,0,0,.4)}
.login-logo{font-family:var(--serif);font-size:28px;color:var(--navy);margin-bottom:8px;letter-spacing:-.02em}
.login-sub{color:var(--slate-light);font-size:14px;margin-bottom:32px}
.login-field{position:relative;margin-bottom:16px}
.login-field input{width:100%;padding:14px 18px;border:2px solid #E2E8F0;border-radius:10px;font-family:var(--sans);font-size:16px;transition:border-color .2s;outline:none;-webkit-appearance:none}
.login-field input:focus{border-color:var(--teal)}
.login-field input.error{border-color:#EF4444;animation:shake .4s}
.login-btn{width:100%;padding:14px;background:var(--teal);color:var(--white);border:none;border-radius:10px;font-family:var(--sans);font-size:16px;font-weight:500;cursor:pointer;transition:background .2s,transform .1s}
.login-btn:hover{background:var(--teal-dark)}
.login-btn:active{transform:scale(.98)}
.login-btn:focus-visible{outline:2px solid var(--teal);outline-offset:2px}
.login-error{color:#EF4444;font-size:13px;margin-top:8px;min-height:20px}
@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

/* CONTENT (hidden until decrypted) */
.proposal{display:none;opacity:0;transition:opacity .8s var(--ease)}
.proposal.visible{display:block;opacity:1}
.container{max-width:960px;margin:0 auto;padding:0 24px}

/* HERO */
.hero{background:var(--navy);color:var(--white);padding:80px 0 64px;text-align:center}
.hero-badge{display:inline-block;background:rgba(194,182,151,.2);color:var(--gold-light);font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;padding:6px 16px;border-radius:100px;margin-bottom:24px}
.hero h1{font-family:var(--serif);font-size:clamp(32px,5vw,52px);line-height:1.15;font-weight:400;margin-bottom:20px;letter-spacing:-.02em}
.hero h1 .gold{color:var(--gold-light)}
.hero-subtitle{max-width:600px;margin:0 auto 28px;color:var(--slate-light);font-size:17px;line-height:1.65}
.hero-meta{color:var(--slate-light);font-size:14px;display:flex;align-items:center;justify-content:center;gap:12px;flex-wrap:wrap}
.hero-meta .separator{color:var(--slate)}

/* CONSTAT */
.constat{padding:72px 0}
h2{font-family:var(--serif);font-size:clamp(26px,3.5vw,38px);font-weight:400;margin-bottom:12px;letter-spacing:-.015em;color:var(--navy)}
.section-intro{color:var(--slate-light);font-size:17px;margin-bottom:40px;max-width:680px}
.comparison{margin-bottom:40px}
.comparison-row{margin-bottom:12px}
.comparison-bar{height:32px;border-radius:6px;min-width:6px;transition:width 1.2s var(--ease)}
.comparison-row.you .comparison-bar{background:var(--teal)}
.comparison-row.other .comparison-bar{background:var(--slate-light)}
.comparison-row.other.big .comparison-bar{background:var(--navy)}
.comparison-label{font-size:14px;color:var(--text);margin-top:4px}
.comparison-note{font-size:12px;color:var(--slate-light);margin-top:20px;font-style:italic}
.constat-insight{display:flex;gap:20px;background:var(--bg-warm);border-left:4px solid var(--teal);border-radius:0 12px 12px 0;padding:28px 28px}
.insight-icon{flex-shrink:0;color:var(--teal);margin-top:2px}
.constat-insight p{font-size:15px;line-height:1.7;margin-bottom:8px}
.constat-insight p:last-child{margin-bottom:0}
.insight-highlight{font-weight:500;color:var(--navy);font-size:16px !important}

/* ARTICLES */
.articles{padding:72px 0;background:var(--white)}
.tier{margin-bottom:48px}
.tier-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.tier-header h3{font-family:var(--serif);font-size:22px;font-weight:400;color:var(--navy)}
.tier-badge{font-size:12px;font-weight:500;padding:4px 12px;border-radius:100px;letter-spacing:.02em}
.tier-1{background:#DCFCE7;color:#166534}
.tier-2{background:#DBEAFE;color:#1E40AF}
.tier-3{background:#F3E8FF;color:#6B21A8}
.accordion{border:1px solid #E2E8F0;border-radius:10px;margin-bottom:8px;overflow:hidden;background:var(--bg)}
.accordion-trigger{width:100%;display:flex;align-items:center;gap:12px;padding:16px 20px;background:none;border:none;font-family:var(--sans);font-size:15px;cursor:pointer;text-align:left;transition:background .15s}
.accordion-trigger:hover{background:#EDF7FB}
.accordion-trigger:focus-visible{outline:2px solid var(--teal);outline-offset:-2px}
.accordion-norm{font-weight:700;color:var(--navy);min-width:140px}
.accordion-count{color:var(--slate-light);font-size:13px;flex:1}
.accordion-chevron{flex-shrink:0;transition:transform .25s var(--ease);color:var(--slate-light)}
.accordion-trigger[aria-expanded="true"] .accordion-chevron{transform:rotate(180deg)}
.accordion-content{max-height:0;overflow:hidden;transition:max-height .35s var(--ease)}
.accordion-content.open{max-height:2000px}
.article-item{padding:16px 20px;border-top:1px solid #E2E8F0;display:flex;flex-wrap:wrap;align-items:baseline;gap:8px 12px}
.article-title{font-weight:500;color:var(--navy);flex:1;min-width:200px}
.intent-badge{font-size:11px;font-weight:500;padding:3px 10px;border-radius:100px;white-space:nowrap;flex-shrink:0}
.intent-badge.transactionnel{background:#FEF3C7;color:#92400E}
.intent-badge.informationnel{background:#E0F2FE;color:#075985}
.intent-badge.comparatif{background:#F3E8FF;color:#6B21A8}
.intent-badge.local{background:#DCFCE7;color:#166534}
.article-why{width:100%;font-size:13px;color:var(--slate-light);line-height:1.5;margin-top:2px}

/* OFFRES */
.offres{padding:72px 0}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;align-items:start}
.pricing-card{background:var(--white);border:2px solid #E2E8F0;border-radius:16px;padding:36px 28px;position:relative;transition:transform .2s var(--ease),box-shadow .2s var(--ease)}
.pricing-card:hover{transform:translateY(-3px);box-shadow:0 12px 24px -8px rgba(0,0,0,.08)}
.pricing-card.recommended{border-color:var(--teal);box-shadow:0 8px 32px -8px rgba(12,118,159,.2)}
.pricing-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);background:var(--teal);color:var(--white);font-size:12px;font-weight:700;padding:4px 16px;border-radius:100px;letter-spacing:.04em;text-transform:uppercase}
.pricing-name{font-family:var(--serif);font-size:24px;color:var(--navy);margin-bottom:8px}
.pricing-price{font-size:48px;font-weight:700;color:var(--navy);line-height:1;margin-bottom:24px;letter-spacing:-.03em}
.pricing-currency{font-size:18px;font-weight:500;color:var(--slate-light);margin-left:2px}
.pricing-period{font-size:16px;font-weight:400;color:var(--slate-light)}
.pricing-features{list-style:none;margin-bottom:24px}
.pricing-features li{display:flex;align-items:flex-start;gap:10px;padding:8px 0;font-size:14px;line-height:1.5;color:var(--slate)}
.pricing-features .check{flex-shrink:0;color:var(--teal);margin-top:1px}
.pricing-projection{background:var(--bg);border-radius:8px;padding:14px 16px;font-size:13px;color:var(--slate);line-height:1.6;margin-bottom:16px}
.pricing-engagement{font-size:13px;color:var(--slate-light);text-align:center}

/* ROI */
.roi{padding:0 0 72px}
.roi-box{background:var(--navy);color:var(--white);border-radius:16px;padding:48px 40px}
.roi-box h2{color:var(--gold-light);margin-bottom:16px}
.roi-box p{color:var(--slate-light);font-size:16px;line-height:1.7;margin-bottom:12px;max-width:700px}
.roi-box p:last-child{margin-bottom:0}
.roi-box strong{color:var(--white)}
.roi-box em{color:var(--gold-light);font-style:italic}
.roi-source{font-size:12px;color:var(--slate-light);margin-top:16px !important;padding-top:12px;border-top:1px solid rgba(255,255,255,.1)}

/* CTA */
.cta-section{padding:72px 0;text-align:center;background:var(--white)}
.cta-section h2{margin-bottom:12px}
.cta-section p{color:var(--slate-light);font-size:17px;margin-bottom:28px}
.cta-button{display:inline-block;padding:16px 40px;background:var(--teal);color:var(--white);text-decoration:none;font-family:var(--sans);font-size:17px;font-weight:500;border-radius:10px;transition:background .2s,transform .1s;cursor:pointer}
.cta-button:hover{background:var(--teal-dark)}
.cta-button:active{transform:scale(.98)}
.cta-button:focus-visible{outline:2px solid var(--teal-dark);outline-offset:2px}
.cta-sub{font-size:13px;color:var(--slate-light);margin-top:12px !important}

/* FOOTER */
footer{padding:40px 0;text-align:center;border-top:1px solid #E2E8F0;color:var(--slate-light);font-size:13px}
footer p{margin-bottom:4px}
.footer-sub{font-style:italic;font-size:12px}

/* RESPONSIVE */
@media(max-width:768px){
  .comparison-label{font-size:13px}
  .pricing-grid{grid-template-columns:1fr;max-width:400px;margin:0 auto}
  .pricing-card.recommended{order:-1}
  .hero{padding:56px 0 48px}
  .constat-insight{flex-direction:column;gap:12px}
  .accordion-norm{min-width:auto}
  .article-item{flex-direction:column;align-items:flex-start}
  .login-card{padding:36px 28px}
  .roi-box{padding:36px 24px}
}
@media(max-width:480px){
  .comparison-bar{height:24px}
  .hero-meta{flex-direction:column;gap:4px}
  .hero-meta .separator{display:none}
  .tier-header{flex-direction:column;gap:8px;align-items:flex-start}
}

/* REDUCED MOTION */
@media(prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms !important;transition-duration:.01ms !important}
  html{scroll-behavior:auto}
}
</style>
</head>

  <div class="login-card">
    <div class="login-logo">SIRFAS</div>
    <p class="login-sub">Document confidentiel — Accès protégé</p>
    <form id="loginForm" autocomplete="off">
      <div class="login-field">
        <input type="password" id="passwordInput" placeholder="Mot de passe" autofocus aria-label="Mot de passe">
      </div>
      <button type="submit" class="login-btn">Accéder à la proposition</button>
      <p class="login-error" id="loginError" aria-live="polite"></p>
    </form>
  </div>
</div>

    const tag = b64ToArr(payload.tag);
    const data = b64ToArr(payload.data);

    const combined = new Uint8Array(data.length + tag.length);
    combined.set(data);
    combined.set(tag, data.length);

    const enc = new TextEncoder();
    const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      {name:'PBKDF2', salt, iterations:100000, hash:'SHA-256'},
      keyMaterial,
      {name:'AES-GCM', length:256},
      false,
      ['decrypt']
    );

    const decrypted = await crypto.subtle.decrypt({name:'AES-GCM', iv}, key, combined);
    return new TextDecoder().decode(decrypted);
  }

  form.addEventListener('submit', async function(e){
    e.preventDefault();
    const pwd = input.value.trim();
    if(!pwd){input.focus();return;}

    try{
      const html = await decrypt(pwd);
      proposal.innerHTML = html;
      proposal.classList.add('visible');
      screen.classList.add('hidden');
      initAccordions();
      animateCounters();
    } catch(err){
      error.textContent = 'Mot de passe incorrect';
      input.classList.add('error');
      input.value = '';
      input.focus();
      setTimeout(()=>{input.classList.remove('error');error.textContent='';},2000);
    }
  });

  function initAccordions(){
    document.querySelectorAll('.accordion-trigger').forEach(btn=>{
      btn.addEventListener('click',function(){
        const expanded = this.getAttribute('aria-expanded')==='true';
        this.setAttribute('aria-expanded', !expanded);
        const content = this.nextElementSibling;
        content.classList.toggle('open');
      });
    });
  }

  function animateCounters(){
    const observer = new IntersectionObserver((entries)=>{
      entries.forEach(entry=>{
        if(!entry.isIntersecting) return;
        const el = entry.target;
        const target = parseInt(el.dataset.count);
        if(!target) return;
        const duration = 1200;
        const start = performance.now();
        function step(now){
          const progress = Math.min((now-start)/duration, 1);
          const eased = 1 - Math.pow(1-progress, 3);
          const current = Math.round(eased * target);
          el.textContent = current.toLocaleString('fr-FR');
          if(progress<1) requestAnimationFrame(step);
        }
        requestAnimationFrame(step);
        observer.unobserve(el);
      });
    },{threshold:0.3});
    document.querySelectorAll('[data-count]').forEach(el=>observer.observe(el));
  }
})();
</script>
